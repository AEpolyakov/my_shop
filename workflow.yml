name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and start services with Docker Compose
      run: |
        docker-compose up -d --build
        # Ждем пока PostgreSQL будет готов
        timeout 30s bash -c 'until docker-compose exec -T db pg_isready -U postgres; do sleep 2; done'

    - name: Run Black (check mode) inside the app container
      run: |
        docker-compose exec -T app black --check --diff .

    - name: Run tests with pytest inside the app container
#      env:
#        DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/app_db
#        TESTING: "True"
      run: |
        docker-compose exec -T app pytest -v --asyncio-mode=auto

    - name: Show logs if tests failed
      if: failure()
      run: |
        echo "=== App container logs ==="
        docker-compose logs app
        echo "=== DB container logs ==="
        docker-compose logs db

    - name: Stop and remove containers
      if: always()
      run: docker-compose down -v