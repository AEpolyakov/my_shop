name: CI

on:
  push:
    branches: [ main, master, develop, feature/* ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Create .env file for CI
      run: |
        cat > .env << EOF
        APP_PORT=8000
        LOG_LEVEL=info
        POSTGRES_PASSWORD=1
        POSTGRES_DB=my_shop
        POSTGRES_PORT=5432
        POSTGRES_USER=myuser
        POSTGRES_HOST=db
        RABBIT_PORT=5672
        RABBIT_QUEUE=product
        RABBIT_USER=guest
        RABBIT_PASS=guest
        KAFKA_BOOTSTRAP_SERVERS=kafka:29092
        KAFKA_TOPIC=product
        KAFKA_CONSUMER_GROUP_ID=product_group
        EOF

        echo "Created .env file:"
        cat .env

    - name: Build and start services with Docker Compose
      run: |
        docker compose up -d --build
        # Ждем пока PostgreSQL будет готов
        sleep 10
        docker compose ps

    - name: Check if containers are running
      run: |
        docker compose ps
        docker compose logs db

    - name: Run Black (check mode)
      run: |
        docker compose exec -T app black --check --diff .

    - name: Run tests with pytest
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/app_db
        TESTING: "True"
      run: |
        docker compose exec -T app pytest -v --asyncio-mode=auto

    - name: Show logs if tests failed
      if: failure()
      run: |
        echo "=== App container logs ==="
        docker compose logs app
        echo "=== DB container logs ==="
        docker compose logs db

    - name: Stop and remove containers
      if: always()
      run: docker compose down -v